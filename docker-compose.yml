services:
  mysql:
    image: mysql-basilios
    container_name: mysql-basilios
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: basilios_db
      MYSQL_USER: basilios
      MYSQL_PASSWORD: basilios123
    ports:
      - "127.0.0.1:3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - basilios-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  java:
    image: java-basilios
    container_name: java-basilios
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/basilios_db
      SPRING_DATASOURCE_USERNAME: basilios
      SPRING_DATASOURCE_PASSWORD: basilios123
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: basilios
      RABBITMQ_PASSWORD: basilios123
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
    networks:
      - basilios-network

  nodejs:
    image: nodejs-basilios
    container_name: nodejs-basilios
    restart: unless-stopped
    ports:
      - "3000:5173"
    depends_on:
      - mysql
      - java
    environment:
      DATABASE_HOST: mysql
      DATABASE_PORT: 3306
      DATABASE_NAME: basilios_db
      DATABASE_USER: basilios
      DATABASE_PASSWORD: basilios123
      API_JAVA_URL: http://java:8080
    networks:
      - basilios-network

  # ========== RABBITMQ (Message Broker) ==========
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq-basilios
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: basilios
      RABBITMQ_DEFAULT_PASS: basilios123
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - basilios-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ========== EMAIL API (Microserviço de Notificações) ==========
  email-api:
    image: email-api-basilios
    container_name: email-api-basilios
    restart: unless-stopped
    ports:
      - "8081:8081"
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      DB_URL: jdbc:mysql://mysql:3306/basilios_email?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
      DB_USERNAME: basilios
      DB_PASSWORD: basilios123
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: basilios
      RABBITMQ_PASSWORD: basilios123
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
    networks:
      - basilios-network

networks:
  basilios-network:
    driver: bridge

volumes:
  mysql-data:
  rabbitmq-data:
